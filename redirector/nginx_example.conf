# Cert paths differ by deployment method:
#   Bare-metal: /home/c2server/c2-framework/certs/server.{crt,key}
#   Docker:     /etc/nginx/certs/server.{crt,key}

log_format c2_access '$remote_addr "$request" "$http_user_agent" '
                     'req=$request_length status=$status';

server {
    listen 443 ssl;
    server_name c2.lab.internal;

    access_log /var/log/nginx/c2_access.log c2_access;
    error_log  /var/log/nginx/c2_error.log warn;

    # Hide nginx version
    server_tokens off;

    # TLS — same cert and key used by the backend server
    ssl_certificate     /home/c2server/c2-framework/certs/server.crt;
    ssl_certificate_key /home/c2server/c2-framework/certs/server.key;

    # Enforce modern TLS only
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Impersonate Apache to obscure the real server stack
    proxy_hide_header Server;
    add_header        Server 'Apache/2.4.54';

    # HSTS - force HTTPS to prevent downgrade attacks
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Block directory traversal attempts
    if ($request_uri ~ "\.\.") {
        return 403;
    }

    # Block common shell metadata paths
    if ($request_uri ~ "(wp-login\.php|wp-admin|admin\.php|login\.php)") {
        return 403;
    }

    # Forward beacon traffic to backend server
    location = /beacon {
        # Only POST is valid — reject everything else at this location
        limit_except POST {
            deny all;
        }

        if ($http_user_agent !~* "Mozilla") {
            return 404;
        }

        if ($content_type != "application/octet-stream") {
            return 404;
        }

        # For Docker: proxy_pass http://c2-server:8443/beacon;
        # For bare-metal: proxy_pass http://127.0.0.1:8443/beacon;
        proxy_pass         http://127.0.0.1:8443/beacon;
        proxy_http_version 1.1;

        # Pass real client IP so server logs show agent IP not 127.0.0.1
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

        # Strip Host header — backend uses its own config not the incoming hostname
        proxy_set_header   Host             $host;

        # Forward raw binary payload without buffering or modification
        proxy_request_buffering  off;
        proxy_buffering          off;

        # Match agent request timeout
        proxy_connect_timeout    10s;
        proxy_send_timeout       10s;
        proxy_read_timeout       10s;

        # Pass large payloads — must match MAX_BEACON_SIZE in server_main.py
        client_max_body_size 256k;
    }

    # Return fake normal website for all other paths 
    location / {
        root /var/www/html;
        index index.html;
    }
}

# Redirect plain HTTP to HTTPS
server {
    listen 80;
    server_name c2.lab.internal;
    return 301 https://$host$request_uri;
}